<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iMerch Portal</title>
    <style>
        :root { --primary-red: #d32f2f; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f4f7f6; padding: 20px; color: #333; }
        .page-container { max-width: 800px; margin: auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .dashboard-view { text-align: center; }
        .card { background: #f9f9f9; padding: 20px; border-left: 5px solid var(--primary-red); margin: 20px 0; border-radius: 4px; text-align: left; }
        .form-view { display: none; }
        .header { text-align: center; margin-bottom: 30px; border-bottom: 3px solid var(--primary-red); padding-bottom: 20px; }
        .logo { max-width: 200px; }
        h2, h1 { color: var(--primary-red); text-transform: uppercase; }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .section { margin-bottom: 30px; }
        .row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #eee; }
        .rating-group { display: flex; gap: 12px; }
        .rating-group label { display: flex; align-items: center; cursor: pointer; font-weight: bold; }
        .rating-group input { width: 18px; height: 18px; margin-right: 5px; accent-color: var(--primary-red); cursor: pointer; }
        .action-steps-container { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; }
        .action-step-input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; }
        textarea { width: 100%; height: 60px; margin-top: 10px; border: 1px solid #ccc; border-radius: 5px; padding: 10px; resize: none; }
        .sig-container { display: flex; flex-direction: column; gap: 5px; margin-top: 10px; }
        canvas { border: 1px solid #ccc; border-radius: 5px; cursor: crosshair; background: #fafafa; }
        .clear-btn { font-size: 12px; color: var(--primary-red); cursor: pointer; background: none; border: none; text-decoration: underline; }
        .footer { margin-top: 50px; text-align: center; font-size: 0.85rem; color: #666; border-top: 1px solid #ccc; padding-top: 20px; }
        .btn { background: var(--primary-red); color: white; padding: 15px; width: 100%; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 20px; }
        @media print {
            .btn, .clear-btn, .dashboard-view, .back-btn { display: none !important; }
            .form-view { display: block !important; }
            body { background-color: white; padding: 0; }
            .page-container { box-shadow: none; border-radius: 0; }
        }
    </style>
</head>
<body>

<div class="page-container">
    <div id="dashboard" class="dashboard-view">
        <img src="logo1.png" alt="iMerch Logo" class="logo">
        <h1>Requirement Assessments</h1>
        <div class="card">
            <h3>1. Monthly Performance Assessment</h3>
            <p>Effective June 15, 2026: Mandatory attachment to DTRs based on previous month's coverage plan.</p>
            <button class="btn" onclick="toggleView()">OPEN PERFORMANCE FORM</button>
        </div>
        <div class="card">
            <h3>2. Exit Clearance</h3>
            <p>Effective June 5, 2026: Inventory report (APP/Google) is required for all resignations.</p>
            <button class="btn" style="background:#555;" onclick="alert('Contact HR for the Exit Clearance form template.')">VIEW EXIT CLEARANCE INFO</button>
        </div>
    </div>

    <div id="form" class="form-view">
        <button class="btn" style="width: auto; padding: 5px 15px;" onclick="toggleView()">← Back to Dashboard</button>
        <div class="header"><h2>MONTHLY PERFORMANCE ASSESSMENT</h2></div>
        <div class="info-grid">
            <input type="text" placeholder="Employee Name" style="padding:8px;">
            <input type="date" style="padding:8px;">
            <input type="text" placeholder="Account / Store" style="padding:8px;">
            <input type="text" placeholder="Supervisor" style="padding:8px;">
            <input type="text" placeholder="Review Period" style="grid-column: span 2; padding:8px;">
        </div>

        <div id="form-sections"></div>

        <button class="btn" onclick="window.print()">SAVE & DOWNLOAD AS PDF</button>
    </div>
</div>

<script>
    function toggleView() {
        const d = document.getElementById('dashboard'), f = document.getElementById('form');
        d.style.display = (d.style.display === 'none') ? 'block' : 'none';
        f.style.display = (f.style.display === 'none') ? 'block' : 'none';
    }

    // Dynamic checkboxes
    const sections = ["ATTENDANCE & BEHAVIOR", "MERCHANDISING EXECUTION", "ADMINISTRATIVE REPORTS & COMPLIANCE", "CLIENT FEEDBACK"];
    const container = document.getElementById('form-sections');
    sections.forEach(s => {
        let html = `<div class="section"><h3>${s}</h3>`;
        for(let i=0; i<3; i++) {
            html += `<div class="row">Task item ${i+1}: <div class="rating-group">${[1,2,3,4,5].map(n => `<label><input type="checkbox"> ${n}</label>`).join('')}</div></div>`;
        }
        html += `<textarea placeholder="Supervisor Comments..."></textarea></div>`;
        container.innerHTML += html;
    });

    // Signature setup
    function setupCanvas(id) {
        const canvas = document.getElementById(id), ctx = canvas.getContext('2d');
        let painting = false;
        canvas.onmousedown = () => painting = true;
        canvas.onmouseup = () => { painting = false; ctx.beginPath(); };
        canvas.onmousemove = (e) => {
            if (!painting) return;
            ctx.lineWidth = 2; ctx.lineCap = 'round';
            ctx.lineTo(e.offsetX, e.offsetY); ctx.stroke(); ctx.beginPath(); ctx.moveTo(e.offsetX, e.offsetY);
        };
    }
    // (Call setupCanvas inside a small timeout to ensure elements exist)
    setTimeout(() => {
        // Add signature area manually to container or hardcode it
        setupCanvas('sigEmp'); setupCanvas('sigSup');
    }, 500);
</script>
</body>
</html>
