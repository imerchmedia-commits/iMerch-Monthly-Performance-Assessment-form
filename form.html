<!DOCTYPE html>

<head>

<body>
<div class="container">
    <h1>iMerch Requirement Portal</h1>
    
    <div class="card">
        <h3>1. Monthly Performance Assessment</h3>
        <p>Target: Field Team | Effective: June 15, 2026</p>

    <div class="card">
        <h3>2. Exit Clearance</h3>
        <p>Required for resigned staff. Effective: June 5, 2026</p>

    </div>

</html>
